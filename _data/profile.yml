short_bio: >-
  <p>
    I am a Post-training Lead & Science Manager at Amazon, where I am a founding member of
    <strong>Rufus</strong> &mdash; Amazon's LLM-powered shopping assistant. I trained the in-house LLM from
    scratch and built Rufus end-to-end, from core model development to customer-facing features, and
    successfully launched it worldwide.
  </p>
  <p>
    <strong>I lead 30 scientists owning the end-to-end post-training stack for Rufus LLMs</strong>, spanning
    SFT and RL. We design and scale post-training recipes to advance core capabilities, including
    reasoning, instruction following, agentic, and helpfulness, and drive application-level preference
    alignment for Rufus.
  </p>
  <p>
    Prior to Rufus, I was a Senior Applied Scientist at Amazon Search, where I led the development of large-scale
    query understanding and NLP systems serving millions of customers daily. I received my Ph.D. in Computer
    Science from the Harbin Institute of Technology.
  </p>

