short_bio: >
  <p>
  I lead post-training for Rufus, Amazon LLM-powered shopping assistant. As a founding member, I built the in-house foundation models from scratch and build Rufus end-to-end, from core modeling to customer-facing experiences. I currently lead a team of 30 scientists, owning the full post-training stack across SFT and RL. We design and scale post-training recipes to advance core capabilities—reasoning, instruction following, agentic behavior, and helpfulness—while driving application-level preference alignment for Rufus.
  </p>
  <p>
    Prior to Rufus, I was an Applied Scientist at Query Understanding team (Amazon Search), where I led the development of large-scale query parsing and NLP systems serving millions of customers daily.
  </p>

